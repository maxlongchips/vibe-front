<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeFront</title>
  <script>
    // GitHub Pages SPA fallback
    var pathSegmentsToKeep = 1; // for repo-level pages (username.github.io/repo/)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#09090b;color:#a1a1aa;font-family:sans-serif;">
    <p>Redirecting...</p>
  </div>
</body>
</html>
